name: nirman_crm
description: "Nirman Media CRM — lead management for real estate sales"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.5.0
  firebase_messaging: ^15.1.0
  firebase_core: ^3.4.0
  firebase_crashlytics: ^4.1.0
  drift: ^2.20.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.3.0
  confetti: ^0.8.0
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.0
  alarm: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.1
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0
  flutter_launcher_icons: ^0.14.1
  # offline_store_test fakes path_provider to a temp dir
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F4F1E9"
  adaptive_icon_foreground: "assets/icon/app_logo.png"
